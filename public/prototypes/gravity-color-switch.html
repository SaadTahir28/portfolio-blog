<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gravity Color Switch</title>
<style>
  html,body{margin:0;height:100%;background:#12121a;overflow:hidden;font-family:system-ui,sans-serif;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  #wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  canvas{background:#181824;max-width:100%;max-height:100%}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;background:rgba(10,10,16,.55);padding:0 24px}
  .overlay h1{font-size:28px;margin:0 0 8px}
  .overlay p{margin:4px 0;opacity:.8}
  .hidden{display:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="start" class="overlay"><h1>Gravity Color Switch</h1><p>You climb. Your color = the wall you're stuck to.</p><p>Each bar ahead matches the left or the right wall.<br>Tap to flip sideways. Tap again mid-air to cancel.</p><p><b>Tap to start</b></p></div>
  <div id="over" class="overlay hidden"><h1>Game Over</h1><p id="finalScore"></p><p id="best"></p><p><b>Tap to retry</b></p></div>
</div>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const W = 420, H = 700; cv.width = W; cv.height = H;
function fit(){ const s = Math.min(innerWidth/W, innerHeight/H); cv.style.width = W*s+'px'; cv.style.height = H*s+'px'; }
addEventListener('resize', fit); fit();

const COLORS = ['#ff4d6d','#ffd23f','#3ddc84','#4dabff'];
const SIDE = 72;
const L = SIDE, R = W-SIDE, CORR = R-L;
const PY = 500, SIZE = 34, GRAV = 13000;

let state='start', player, zones, speed, score, best=0, t, shake, payout, nextGemAt, gemQueued, boost;
let particles, shards, floaters, trail, ring, frenzy, scorePop, streaks, cin=0, deathT=0, dieFlash=0;

function rand(a,b){ return a + Math.random()*(b-a); }

function genZone(){
  const topY = zones.length ? zones[zones.length-1].y - zones[zones.length-1].h : H;
  const shrink = Math.min(100, t*3);
  const h = rand(800, 950) - shrink;
  const lc = (Math.random()*4)|0;
  let rc = (Math.random()*4)|0; if(rc===lc) rc=(rc+1)%4;
  const barColor = Math.random()<0.5 ? lc : rc;
  const hasGem = gemQueued; gemQueued = false;
  const ramping = boost.cur !== boost.target || frenzy > 0;
  zones.push({ y:topY, h, lc, rc, hasBar:!hasGem && !ramping, barY: topY - h*0.65, barColor, passed:false,
               gem: hasGem ? { y: topY - h*0.5, taken:false } : null });
}
function topUpZones(){ while(!zones.length || (zones[zones.length-1].y - zones[zones.length-1].h) > -60) genZone(); }
function zoneAt(y){ for(const z of zones) if(y > z.y-z.h && y <= z.y) return z; return zones[0]; }

function reset(){
  player = { x: R-SIZE/2, vx:0, g:1, grounded:true, color:0, squash:0, airFlips:0 };
  zones=[]; particles=[]; shards=[]; floaters=[]; trail=[]; streaks=[];
  speed=230; score=0; t=0; shake=0; frenzy=0; scorePop=0; ring=null;
  payout={left:0,timer:0}; nextGemAt=5; gemQueued=false;
  boost={cur:0,start:0,target:0,elapsed:0};
  topUpZones();
  zones[0].barY = zones[0].y - zones[0].h + 60;
  player.color = zones[0].rc;
}

function flip(){
  if(state==='dying') return;
  if(state==='start'){ state='play'; document.getElementById('start').classList.add('hidden'); return; }
  if(state==='over'){ reset(); state='play'; document.getElementById('over').classList.add('hidden'); return; }
  if(state==='play' && cin>0.3) return;                       // celebration owns the stage
  if(player.grounded){ player.g*=-1; player.grounded=false; player.vx=0; player.airFlips=0; }
  else if(player.airFlips < 1){ player.g*=-1; player.vx=0; player.airFlips++; sparkle(player.x,PY,'#ffffff'); }
}
addEventListener('pointerdown', e=>{ e.preventDefault(); flip(); });
addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); flip(); } });
addEventListener('contextmenu', e=>e.preventDefault());

function startDeath(z){
  state='dying'; deathT=1.1; dieFlash=1; shake=1.9; frenzy=0; cin=0;
  // the player shatters into a 4x4 grid of chunks
  const c=SIZE/4;
  for(let i=0;i<4;i++) for(let j=0;j<4;j++){
    const px=player.x-SIZE/2+c/2+i*c, py=PY-SIZE/2+c/2+j*c;
    const a=Math.atan2(py-PY, px-player.x)+rand(-.5,.5), sp=rand(140,520);
    shards.push({x:px, y:py, w:c-2, h:c-2, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-80, rot:0, vr:rand(-12,12), color:COLORS[player.color], life:1});
  }
  // sparks in the killer bar's color
  for(let i=0;i<16;i++) particles.push({x:player.x, y:PY, vx:rand(-320,320), vy:rand(-320,320), life:rand(.4,.8), color:COLORS[z.barColor]});
}
function showOver(){
  state='over'; best=Math.max(best,score);
  document.getElementById('finalScore').textContent='Score: '+score;
  document.getElementById('best').textContent='Best: '+best;
  document.getElementById('over').classList.remove('hidden');
}
function sparkle(x,y,color){
  for(let i=0;i<10;i++) particles.push({x,y,vx:rand(-130,130),vy:rand(-130,130),life:.4,color});
}

function passBar(z){
  score++; scorePop=1; shake=Math.max(shake,0.45);
  floaters.push({x:W/2, y:z.barY-24, vy:-90, life:.8, text:'+1', color:COLORS[z.barColor], size:26});
  // bar shatters into shards flying outward
  const n=9, w=CORR/n;
  for(let i=0;i<n;i++){
    const cx = L + i*w + w/2, dir = (cx < W/2 ? -1 : 1);
    shards.push({x:cx, y:z.barY, w:w-3, h:12, vx:dir*rand(120,420)*Math.abs(cx-W/2)/CORR*2 + rand(-40,40),
                 vy:rand(-160,60), rot:0, vr:rand(-9,9), color:COLORS[z.barColor], life:.7});
  }
  sparkle(player.x, PY, COLORS[player.color]);
}

function catchGem(z){
  z.gem.taken=true;
  payout.left += 20; payout.timer = 0;
  nextGemAt += 25;
  boost.start = boost.cur; boost.target += 5; boost.elapsed = 0;
  for(const zz of zones) if(zz.hasBar && zz.barY < -20) zz.hasBar=false;
  frenzy = 1; shake = 1.3;
  ring = {r: 10, life: 1};
  for(let i=0;i<44;i++){                                    // confetti in the game's own palette
    const a = rand(0, Math.PI*2), sp = rand(120, 460);
    particles.push({x:W/2, y:PY, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:rand(.5,.9), color:COLORS[(Math.random()*4)|0]});
  }
}

function update(dt){
  if(state==='dying'){
    deathT -= dt;
    shake=Math.max(0,shake-dt*3.2);
    dieFlash=Math.max(0,dieFlash-dt*2.2);
    const ts = Math.max(0, deathT/1.1);
    const ddy = speed*ts*ts*dt;                      // world grinds to a halt
    for(const z of zones){ z.y += ddy; z.barY += ddy; if(z.gem) z.gem.y += ddy; }
    for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; }
    particles = particles.filter(p=>p.life>0);
    for(const s of shards){ s.x+=s.vx*dt; s.y+=s.vy*dt+300*dt*dt; s.vy+=500*dt; s.rot+=s.vr*dt; s.life-=dt; }
    shards = shards.filter(s=>s.life>0);
    for(const tr of trail) tr.life-=dt;
    trail = trail.filter(tr=>tr.life>0);
    if(deathT<=0) showOver();
    return;
  }
  t+=dt;
  if(boost.cur !== boost.target){
    boost.elapsed += dt;
    const k = Math.min(1, boost.elapsed/1.8);
    const e = k<0.5 ? 4*k*k*k : 1 - Math.pow(-2*k+2,3)/2;
    boost.cur = boost.start + (boost.target-boost.start)*e;
  }
  speed = Math.min(900, 230 + (t+boost.cur)*11);

  // physics
  player.vx += GRAV*player.g*dt;
  player.x  += player.vx*dt;
  const half=SIZE/2;
  if(player.x > R-half){
    player.x=R-half; player.vx=0;
    if(!player.grounded && player.g===1){ player.squash=1; shake=Math.max(shake,1); landDust(R,1); }
    player.grounded=(player.g===1);
  }
  if(player.x < L+half){
    player.x=L+half; player.vx=0;
    if(!player.grounded && player.g===-1){ player.squash=1; shake=Math.max(shake,1); landDust(L,-1); }
    player.grounded=(player.g===-1);
  }
  player.squash=Math.max(0,player.squash-dt*7);
  shake=Math.max(0,shake-dt*6);
  frenzy=Math.max(0,frenzy-dt/2);
  // cinematic envelope: eases in over 0.5s, holds, eases out over the last 0.7s
  {
    const e = (1-frenzy)*2;
    cin = frenzy>0 ? Math.min(1, e/0.5) * Math.min(1, (2-e)/0.5) : 0;
  }
  scorePop=Math.max(0,scorePop-dt*5);

  if(!player.grounded) trail.push({x:player.x, y:PY, life:.28, color:player.color});

  if(player.grounded){
    const z = zoneAt(PY);
    const c = player.g===1 ? z.rc : z.lc;
    if(c!==player.color){ player.color=c; sparkle(player.x,PY,COLORS[c]); }
  }

  const dy = speed*(1 + 3.5*cin)*dt;
  for(const z of zones){ z.y += dy; z.barY += dy; if(z.gem) z.gem.y += dy; }
  zones = zones.filter(z=>z.y-z.h < H+10);
  topUpZones();

  if(score >= nextGemAt && !gemQueued && !zones.some(z=>z.gem&&!z.gem.taken)){ gemQueued=true; }

  for(const z of zones){
    if(z.hasBar && !z.passed && Math.abs(z.barY-PY) < half+7){
      z.passed=true;
      if(z.barColor===player.color) passBar(z); else return startDeath(z);
    }
    if(z.gem && !z.gem.taken && Math.abs(z.gem.y-PY) < 34 && Math.abs(player.x-W/2) < 72) catchGem(z);
  }

  if(payout.left>0){
    payout.timer -= dt;
    if(payout.timer<=0){ payout.timer=0.07; payout.left--; score++; scorePop=1; }
  }

  // speed streaks while the frenzy is on — density scales with the cinematic
  if(cin>0.05){
    const n = 1 + (cin*3)|0;
    for(let i=0;i<n;i++) streaks.push({x:rand(L+8,R-8), y:-20, len:rand(40,110), life:.35});
  }
  for(const s of streaks){ s.y += (speed*2.2)*dt; s.life-=dt; }
  streaks = streaks.filter(s=>s.life>0 && s.y<H+90);

  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt + dy*0.5; p.life-=dt; }
  particles = particles.filter(p=>p.life>0);
  for(const s of shards){ s.x+=s.vx*dt; s.y+=s.vy*dt + dy; s.rot+=s.vr*dt; s.life-=dt; }
  shards = shards.filter(s=>s.life>0);
  for(const f of floaters){ f.y+=f.vy*dt; f.life-=dt; }
  floaters = floaters.filter(f=>f.life>0);
  for(const tr of trail) tr.life-=dt;
  trail = trail.filter(tr=>tr.life>0);
  if(ring){ ring.r += 900*dt; ring.life -= dt*1.6; if(ring.life<=0) ring=null; }
}

function landDust(wallX, dir){
  for(let i=0;i<6;i++) particles.push({x:wallX + (dir===1?-4:4), y:PY+rand(-14,14), vx:-dir*rand(30,140), vy:rand(-60,60), life:.3, color:'#ffffff'});
}

function draw(){
  ctx.save();
  // frenzy zoom-pulse around the player
  if(cin>0){
    const zs = 1 + 0.06*cin;
    ctx.translate(W/2, PY); ctx.scale(zs,zs); ctx.translate(-W/2, -PY);
  }
  if(shake>0) ctx.translate((Math.random()-.5)*7*shake,(Math.random()-.5)*7*shake);
  ctx.fillStyle='#181824'; ctx.fillRect(-20,-20,W+40,H+40);

  for(const z of zones){
    const top = Math.round(z.y-z.h), bot = Math.round(z.y);
    ctx.fillStyle=COLORS[z.lc]; ctx.fillRect(-20, top, L+20, bot-top);
    ctx.fillStyle=COLORS[z.rc]; ctx.fillRect(R, top, SIDE+30, bot-top);
    if(z.hasBar && !z.passed){ ctx.fillStyle=COLORS[z.barColor]; ctx.fillRect(L, z.barY-7, CORR, 14); }
    if(z.gem && !z.gem.taken && z.gem.y>-40 && z.gem.y<H+40){
      const pulse = 1 + 0.12*Math.sin(t*9);
      ctx.save(); ctx.translate(W/2, z.gem.y); ctx.rotate(Math.sin(t*3)*0.35); ctx.scale(pulse,pulse);
      ctx.fillStyle='#ffe066'; ctx.shadowColor='#ffe066'; ctx.shadowBlur=20;
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const r = i%2===0 ? 18 : 7.5, a = -Math.PI/2 + i*Math.PI/5;
        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  // frenzy: side walls shimmer + strobing flashes of the wall colors themselves
  if(frenzy>0){
    ctx.fillStyle='rgba(255,255,255,'+(0.18*cin*Math.abs(Math.sin(t*16)))+')';
    ctx.fillRect(-20,0,L+20,H); ctx.fillRect(R,0,SIDE+30,H);
    const z = zoneAt(PY);
    const strobe = COLORS[(Math.sin(t*18)>0) ? z.lc : z.rc];
    ctx.fillStyle=strobe; ctx.globalAlpha=0.10*cin;
    ctx.fillRect(-20,-20,W+40,H+40); ctx.globalAlpha=1;
  }

  // speed streaks
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=2;
  for(const s of streaks){ ctx.globalAlpha=s.life/0.35; ctx.beginPath(); ctx.moveTo(s.x,s.y-s.len); ctx.lineTo(s.x,s.y); ctx.stroke(); }
  ctx.globalAlpha=1;

  // bar shards
  for(const s of shards){
    ctx.save(); ctx.globalAlpha=Math.min(1,s.life/0.5); ctx.translate(s.x,s.y); ctx.rotate(s.rot);
    ctx.fillStyle=s.color; ctx.fillRect(-s.w/2,-s.h/2,s.w,s.h); ctx.restore();
  }
  ctx.globalAlpha=1;

  // shockwave ring
  if(ring){
    ctx.strokeStyle='rgba(255,230,102,'+Math.max(0,ring.life)+')'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(W/2, PY, ring.r, 0, Math.PI*2); ctx.stroke();
  }

  // trail ghosts
  for(const tr of trail){
    ctx.globalAlpha = (tr.life/0.28)*0.35;
    ctx.fillStyle=COLORS[tr.color];
    ctx.beginPath(); ctx.roundRect(tr.x-SIZE/2, tr.y-SIZE/2, SIZE, SIZE, 8); ctx.fill();
  }
  ctx.globalAlpha=1;

  // player — during the cinematic it glides to center, scales up, and spins
  if(state!=='dying'){
  const s=player.squash;
  const sx=1-0.35*s, sy=1+0.35*s;
  const drawX = player.x + (W/2 - player.x)*cin;
  const big = 1 + 1.3*cin;
  ctx.save();
  ctx.translate(drawX + (player.g===1? -SIZE/2*(1-sx) : SIZE/2*(1-sx))*(1-cin), PY);
  ctx.scale(big,big);
  if(frenzy>0) ctx.rotate((1-frenzy)*Math.PI*2*player.g);   // one victory spin across 2s
  ctx.scale(sx,sy);
  ctx.fillStyle=COLORS[player.color];
  ctx.beginPath(); ctx.roundRect(-SIZE/2,-SIZE/2,SIZE,SIZE,8); ctx.fill();
  ctx.strokeStyle = frenzy>0 ? 'hsl('+((t*720)%360)+',100%,70%)' : 'rgba(255,255,255,.7)';
  ctx.lineWidth = frenzy>0 ? 3 : 2; ctx.stroke();
  ctx.restore();
  }

  for(const p of particles){ ctx.globalAlpha=Math.min(1,p.life/0.4); ctx.fillStyle=p.color; ctx.fillRect(p.x-3,p.y-3,6,6); }
  ctx.globalAlpha=1;

  // floating +1s
  for(const f of floaters){
    ctx.globalAlpha=Math.min(1,f.life/0.5);
    ctx.fillStyle=f.color; ctx.font='bold '+f.size+'px system-ui'; ctx.textAlign='center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha=1;

  // score — slides DOWN toward the action during the celebration
  const fs = 34 + 30*scorePop + 20*cin;
  const scoreY = 56 + 244*cin;
  ctx.fillStyle = payout.left>0 ? '#ffe066' : '#fff';
  ctx.font='bold '+fs+'px system-ui'; ctx.textAlign='center';
  ctx.fillText(score, W/2, scoreY);
  ctx.restore();

  if(dieFlash>0){ ctx.fillStyle='rgba(255,60,80,'+(dieFlash*0.35)+')'; ctx.fillRect(0,0,W,H); }
}

let last=performance.now();
function loop(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now;
  if(state==='play' || state==='dying') update(dt);
  draw();
  requestAnimationFrame(loop);
}
reset(); requestAnimationFrame(loop);
</script>
</body>
</html>
